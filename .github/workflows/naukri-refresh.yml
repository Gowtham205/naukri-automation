name: Naukri Daily Profile Refresh

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  refresh-profile:
    name: Update Naukri profile timestamp
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build JAR
        run: mvn -B package -DskipTests --no-transfer-progress

      - name: Inspect JAR manifest
        run: |
          echo "=== Source files found ==="
          find . -name "*.java" -type f
          echo ""
          echo "=== Compiled classes ==="
          find target/classes -name "*.class" 2>/dev/null || echo "NO CLASSES FOUND in target/classes"
          echo ""
          echo "=== MANIFEST.MF inside JAR ==="
          unzip -p target/naukri-automation-1.0.0.jar META-INF/MANIFEST.MF
          echo ""
          echo "=== Our class inside JAR ==="
          unzip -l target/naukri-automation-1.0.0.jar | grep "NaukriProfile"

      - name: Run Naukri profile updater
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          DISPLAY: ':99'
        run: |
          JAR=$(ls target/*.jar | grep -v 'original' | head -1)
          echo "Using JAR: $JAR"
          java -jar "$JAR" 2>&1 | head -20 || java -cp "$JAR" com.naukri.automation.NaukriProfileUpdater

      - name: Report success
        run: |
          echo "✅ Naukri profile updated successfully!"
          echo "Timestamp refreshed at: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "IST time: $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')"
          echo "Your profile is now showing as 'Updated Today' on Naukri."
          echo "Recruiters searching today will see your profile ranked higher."

      - name: Report status
        if: failure()
        run: echo "Profile update failed. Check logs above."